<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SBS — Autoteste de endpoints</title>
<style>
  body{font:14px/1.5 system-ui,Segoe UI,Roboto,sans-serif;margin:0;background:#f3f6f4;color:#0c3b37}
  header{background:linear-gradient(120deg,#0B6B61,#0c3b37);color:#fff;padding:20px 24px}
  header h1{margin:0;font-size:19px}
  header p{margin:6px 0 0;font-size:13px;color:#bfe0d6}
  main{padding:20px 24px;max-width:1000px}
  button{background:#6FA331;color:#fff;border:none;border-radius:8px;padding:10px 18px;font:700 13px system-ui;cursor:pointer}
  table{width:100%;border-collapse:collapse;margin-top:14px;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  th,td{text-align:left;padding:9px 12px;border-bottom:1px solid #eef1ee;font-size:12.5px}
  th{background:#eef4ef;font-weight:700}
  .okc{color:#0c8a4e;font-weight:700}
  .errc{color:#c0392b;font-weight:700}
</style>
</head>
<body>
<header>
  <h1>Autoteste de endpoints — SBS</h1>
  <p>Ping em todas as rotas /api + ida-e-volta de gravação. Rode logado (mesma aba do painel) para as rotas protegidas.</p>
</header>
<main>
  <button id="run">Rodar novamente</button>
  <table>
    <thead><tr><th>Rota</th><th>Método</th><th>Status</th><th>ok</th><th>Resposta / observação</th></tr></thead>
    <tbody id="out"></tbody>
  </table>
</main>
<script src="api-selftest.js"></script>
</body>
</html>
