document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

d+))?$/.test((location.hash||'').replace('#','').toLowerCase());\n      if(!isAppHash){ const st=JSON.parse(localStorage.getItem('sbs_estado')||'null'); if(st&&typeof st==='object'&&st.auth){ this.setState(st); } }\n    }catch(e){}\n    try{ this.setState({appLink: location.origin+location.pathname+'#app'}); }catch(e){}\n    try{ this._onResize=()=>this.setState({vw:window.innerWidth}); window.addEventListener('resize',this._onResize); this.setState({vw:window.innerWidth}); }catch(e){}\n    try{ this.loadReal(); }catch(e){}\n    try{ this.loadGov(); }catch(e){}\n  }\n  componentWillUnmount(){ try{ window.removeEventListener('resize',this._onResize); }catch(e){} }\n  _persistKeys(){ return ['auth','isAdmin','role','page','appPage','appUser','eventos','orcamentos','catalogo','leads','partners','robots','notifs','estudo','estudoAplic','campaigns','vendedoresReal','evAnexos','logFiltro','mktDashTab','rankTab','vendFilter']; }\n  salvarEstado(){ try{ if(this.state.role==='app'||!this.state.auth){ return; } const st={}; for(const k of this._persistKeys()){ if(this.state[k]!==undefined) st[k]=this.state[k]; } localStorage.setItem('sbs_estado', JSON.stringify(st)); }catch(e){} }\n  componentDidUpdate(){ try{ clearTimeout(this._pt); this._pt=setTimeout(()=>this.salvarEstado(),250); }catch(e){} }\n  // ---------- API CLIENT (com fallback demo) ----------\n  apiBase(){ return '/api'; }\n  api(nome, opts){\n    const ctrl = (typeof AbortController!=='undefined') ? new AbortController() : null;\n    if(ctrl) setTimeout(()=>{ try{ctrl.abort();}catch(e){} }, 6000);\n    const o = Object.assign({ headers:{'Content-Type':'application/json'} }, opts||{});\n    try{ const tk=localStorage.getItem('sbs_token')||localStorage.getItem('sbs_app_token'); if(tk) o.headers['Authorization']='Bearer '+tk; }catch(e){}\n    if(ctrl) o.signal = ctrl.signal;\n    return fetch(this.apiBase()+'/'+nome, o)\n      .then(r=> r.ok ? r.json() : Promise.reject(new Error('HTTP '+r.status)))\n      .then(j=> (j && j.ok) ? j.data : Promise.reject(new Error((j&&j.erro)||'sem dados')));\n  }\n  apiGet(nome, q){ const qs = q ? ('?'+Object.entries(q).filter(([,v])=>v!=null&&v!=='').map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&')) : ''; return this.api(nome+qs); }\n  apiSend(nome, method, body){ return this.api(nome, { method, body: JSON.stringify(body||{}) }); }\n  // carrega coleções reais; se a API não responder, mantém o modo demonstração\n  loadReal(){\n    if(this.state.role==='app') return; // no app o vendedor usa a rota pública quando publicado\n    const PG={limite:500};\n    const on=()=>{ if(this.state.backend!=='online') this.setState({backend:'online'}); };\n    // qualquer resposta bem-sucedida (mesmo lista vazia) confirma que o backend está no ar\n    this.apiGet('leads',PG).then(rows=>{ on(); if(Array.isArray(rows)&&rows.length) this.setState({leads:rows}); })\n      .catch(()=>{});\n    this.apiGet('orcamentos',PG).then(rows=>{ on(); if(Array.isArray(rows)&&rows.length) this.setState({orcamentos:rows}); })\n      .catch(()=>{});\n    this.apiGet('vendedores',PG).then(rows=>{ on(); if(Array.isArray(rows)&&rows.length) this.setState({vendedoresReal:rows}); })\n      .catch(()=> this.setState({backend: this.state.backend==='online'?'online':'demo'}));\n    this.apiGet('produtos',PG).then(rows=>{ on(); if(Array.isArray(rows)&&rows.length) this.setState({catalogo:rows}); }).catch(()=>{});\n    if(!this.state.eventos) this.setState({eventos:(this.data().events||[]).slice()});\n    this.apiGet('eventos',PG).then(rows=>{ on(); if(Array.isArray(rows)&&rows.length) this.setState({eventos:rows}); }).catch(()=>{});\n    this.apiGet('tenants').then(rows=>{ if(Array.isArray(rows)&&rows.length){ const parts=rows.map(t=>({id:t.slug,slug:t.slug,nome:t.nome,cor:t.cor,logo:t.logo,sigla:(t.nome||'').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase(),produtos:t.produtos||[],politica:t.politica||'',status:t.status,evento:'—',local:'—',vendedores:0,fat:0,eventos:0,leads:0,roi:0})); this.setState({partners:parts, backend:'online'}); } }).catch(()=>{});\n  }\n  // ---------- PAGINAÇÃO SOB DEMANDA (escala p/ 1000+ registros) ----------\n  // Mostra em janelas de 25; ao chegar no fim do que está carregado e havendo\n  // mais páginas no backend (última página cheia = 500), busca a próxima página.\n  shownCount(coll){ const s=this.state.shown||{}; return s[coll]||25; }\n  carregarMais(coll, stateKey){\n    const prox=this.shownCount(coll)+25;\n    this.setState({shown:Object.assign({},this.state.shown,{[coll]:prox})});\n    if(this.state.backend==='online' && stateKey){\n      const loaded=(this.state[stateKey]||[]).length;\n      const pg=(this._pg&&this._pg[coll])||1;\n      if(prox>=loaded && loaded>=pg*500){\n        const next=pg+1;\n        this.apiGet(coll,{limite:500,pagina:next}).then(rows=>{\n          if(Array.isArray(rows)&&rows.length){ this._pg=Object.assign(this._pg||{},{[coll]:next}); this.setState({[stateKey]:(this.state[stateKey]||[]).concat(rows)}); }\n        }).catch(()=>{});\n      }\n    }\n  }\n  maisRodape(coll, stateKey, carregado, totalReal){\n    const cur=this.shownCount(coll);\n    const total=totalReal||carregado;\n    if(cur>=total) return React.createElement('div',{key:'fim',style:{textAlign:'center',font:'500 12px Manrope',color:'#8a9a94',marginTop:14}},'Mostrando todos os '+total.toLocaleString('pt-BR')+' registros');\n    const restam=total-cur;\n    return React.createElement('div',{key:'mais',style:{display:'flex',flexDirection:'column',alignItems:'center',gap:7,marginTop:16}},\n      React.createElement('button',{onClick:()=>this.carregarMais(coll,stateKey),style:{background:'#0c3b37',color:'#fff',border:'none',borderRadius:10,padding:'10px 24px',font:'700 12px Manrope',cursor:'pointer'}},'Carregar mais'),\n      React.createElement('div',{style:{font:'500 11px Manrope',color:'#8a9a94'}},'Mostrando '+Math.min(cur,carregado).toLocaleString('pt-BR')+' de '+total.toLocaleString('p
