<head>

<style>
  .mc-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:22px}
  .mc-kpi{display:flex;gap:13px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px}
  .mc-kpi-ic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;background:#E9F3EF;color:#0B6B61;flex:0 0 auto}
  .mc-kpi-ic i{width:21px;height:21px}
  .mc-kpi.ok .mc-kpi-ic{background:#E4F5EC;color:#0B8A5E}
  .mc-kpi-v{font-size:23px;font-weight:800;line-height:1.1;color:var(--ink)}
  .mc-kpi-l{font-size:12px;color:var(--muted);margin-top:2px}
  .mc-cols{display:grid;grid-template-columns:1.5fr 1fr;gap:18px}
  .mc-side{display:flex;flex-direction:column;gap:14px}
  .mc-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:16px}
  .mc-card-h{font-size:13px;font-weight:800;display:flex;align-items:center;gap:8px;margin-bottom:14px;color:var(--ink)}
  .mc-card-h i{width:17px;height:17px;color:#0B6B61}
  .mc-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer}
  .mc-row:last-child{border-bottom:0}
  .mc-row-main{flex:1;min-width:0}
  .mc-row-t{font-size:13.5px;font-weight:700;color:var(--ink)}
  .mc-row-s{font-size:11.5px;color:var(--muted);margin-top:1px}
  .mc-row-r{font-weight:800;font-size:13.5px;color:#0B6B61}
  .mc-mini{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px}
  .mc-mini-h{font-size:12px;font-weight:800;color:var(--muted);display:flex;align-items:center;gap:7px;text-transform:uppercase;letter-spacing:.03em}
  .mc-mini-h i{width:15px;height:15px;color:#0B6B61}
  .mc-mini-v{font-size:28px;font-weight:800;margin-top:8px;color:var(--ink)}
  .mc-mini-row{display:flex;justify-content:space-between;gap:10px;font-size:12.5px;color:var(--ink-2);margin-top:8px}
  .mc-mini-link{display:inline-block;margin-top:10px;font-size:12.5px;font-weight:700;color:#0B6B61;cursor:pointer;text-decoration:none}
  .mc-note{display:flex;gap:9px;align-items:flex-start;background:#EEF5F2;color:#2a554c;border-radius:13px;padding:13px 16px;margin-top:18px;font-size:13px;line-height:1.5}
  .mc-note i{width:16px;height:16px;flex:0 0 auto;margin-top:1px;color:#0B6B61}
  .mc-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}
  .mc-sub{font-size:12.5px;color:var(--muted);font-weight:600}
  .mc-btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:10px;padding:9px 14px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
  .mc-btn i{width:15px;height:15px}
  .mc-btn.primary{background:#0B6B61;border-color:#0B6B61;color:#fff}
  .mc-btn.primary:hover{background:#095a52}
  .mc-btn.ok{background:#0B8A5E;border-color:#0B8A5E;color:#fff}
  .mc-btn.ghost:hover{border-color:#bcc9c4}
  .mc-btn.danger{color:#b3261e}
  .mc-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
  .mc-ccard{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:16px;cursor:pointer;transition:.15s}
  .mc-ccard:hover{border-color:#9fc4ba;box-shadow:0 6px 18px rgba(11,107,97,.08);transform:translateY(-1px)}
  .mc-ccard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
  .mc-ccard-verba{font-size:12px;font-weight:800;color:#0B6B61}
  .mc-ccard-t{font-size:15px;font-weight:800;color:var(--ink);margin-bottom:6px}
  .mc-ccard-d{font-size:12.5px;color:var(--muted);line-height:1.45;margin-bottom:11px}
  .mc-ccard-meta{display:flex;flex-direction:column;gap:5px}
  .mc-ccard-meta span{font-size:12px;color:var(--ink-2);display:flex;align-items:center;gap:7px}
  .mc-ccard-meta i{width:13px;height:13px;color:var(--muted);flex:0 0 auto}
  .mc-badge{font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px}
  .mc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
  .mc-mat{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .mc-mat-thumb{aspect-ratio:4/3;background:#EEF1F0;display:grid;place-items:center;cursor:pointer;overflow:hidden}
  .mc-mat-thumb img{width:100%;height:100%;object-fit:cover}
  .mc-mat-ph i{width:30px;height:30px;color:#b6c0bb}
  .mc-mat-body{padding:11px 13px}
  .mc-mat-name{font-size:13.5px;font-weight:700;color:var(--ink)}
  .mc-mat-cat{font-size:11.5px;color:var(--muted);margin-top:2px}
  .mc-mat-acts{display:flex;gap:12px;margin-top:9px}
  .mc-link{border:0;background:none;color:#0B6B61;font-size:12px;font-weight:700;cursor:pointer;padding:0}
  .mc-link.danger{color:#b3261e}
  .mc-int{display:flex;align-items:center;gap:13px;padding:12px 0;border-bottom:1px solid var(--line)}
  .mc-int:last-child{border-bottom:0}
  .mc-int-ic{width:40px;height:40px;border-radius:11px;background:#EEF1F0;color:#69756f;display:grid;place-items:center;flex:0 0 auto}
  .mc-int-ic.on{background:#E9F3EF;color:#0B6B61}
  .mc-int-ic i{width:19px;height:19px}
  .mc-int-b{flex:1;min-width:0}
  .mc-int-t{font-size:14px;font-weight:700;color:var(--ink)}
  .mc-int-d{font-size:12px;color:var(--muted);margin-top:1px}
  .mc-int-met{text-align:right;flex:0 0 auto}
  .mc-int-met b{display:block;font-size:13.5px;font-weight:800;color:#0B6B61}
  .mc-int-met span{font-size:10.5px;color:var(--muted)}
  .mc-prev{margin-top:10px}.mc-prev img{max-width:100%;border-radius:10px;max-height:200px}
  .mc-kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .mc-kcol{background:#F4F6F5;border-radius:14px;padding:12px;min-height:120px}
  .mc-kcol-h{font-size:12px;font-weight:800;color:var(--ink-2);margin-bottom:10px;display:flex;justify-content:space-between}
  .mc-kcol-h span{background:#dde5e1;color:#5b6b65;border-radius:10px;padding:0 7px;font-size:11px}
  .mc-kcard{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px;margin-bottom:9px;cursor:pointer}
  .mc-kcard:hover{border-color:#9fc4ba}
  .mc-kcard-t{font-size:13px;font-weight:700;color:var(--ink);line-height:1.35}
  .mc-kcard-m{font-size:11.5px;color:var(--muted);margin-top:6px}
  .mc-tagc{background:#E9F3EF;color:#0B6B61;font-weight:700;padding:2px 7px;border-radius:20px;font-size:10.5px}
  .mc-kcard-f{font-size:11px;color:var(--muted);margin-top:7px;display:flex;align-items:center;gap:5px}
  .mc-kcard-f i{width:12px;height:12px}
  .mc-kempty{font-size:12px;color:#b6c0bb;text-align:center;padding:8px}
  .mc-table{display:flex;flex-direction:column}
  .mc-trow{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr .8fr 1fr;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line);font-size:13px}
  .mc-trow.head{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  .mc-trow:last-child{border-bottom:0}
  .mc-trow .r{text-align:right}
  .mc-trow .strong{font-weight:800}
  .mc-trow .up{color:#0B8A5E;font-weight:700}
  .mc-trow .down{color:#b3261e;font-weight:700}
  .mc-tch{font-weight:700;display:flex;align-items:center;gap:7px}
  .mc-ic{width:15px;height:15px;color:var(--muted)}
  .mc-empty{text-align:center;color:var(--muted);font-size:13px;padding:18px}
  .mc-empty.big{display:flex;flex-direction:column;align-items:center;gap:10px;padding:50px 18px}
  .mc-empty.big i{width:36px;height:36px;color:#b6c0bb}
  .mc-eyebrow{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:#0B6B61;margin-bottom:3px}
  .side-head h2{font-size:20px;font-weight:800;margin:4px 0 8px}
  .side-x{cursor:pointer;color:var(--muted)}.side-x i{width:20px;height:20px}
  .kv .k{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);min-width:120px}
  .kv .vv{font-size:14px;color:var(--ink);flex:1}
  @media(max-width:1000px){.mc-cols{grid-template-columns:1fr}.mc-kanban{grid-template-columns:1fr 1fr}}
  /* Inteligência de Mercado */
  .mi-var{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:800;margin-left:6px}
  .mi-var i{width:13px;height:13px}
  .mi-var.up{color:#0B8A5E}.mi-var.down{color:#b3261e}
  .mi-dim{color:var(--muted)}
  .mi-ctrow{display:grid;grid-template-columns:1.8fr 1.1fr .9fr .8fr 1.1fr .3fr;align-items:center;gap:10px;padding:13px 0;border-bottom:1px solid var(--line);font-size:13px;cursor:pointer}
  .mi-ctrow:hover{background:#FAFBFB}
  .mi-ctrow.head{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);cursor:default}
  .mi-ctrow.head:hover{background:none}
  .mi-ctrow:last-child{border-bottom:0}
  .mi-ctrow .r{text-align:right}.mi-ctrow .strong{font-weight:800}
  .mi-ctrow small{font-size:10.5px}
  .mi-pos{font-size:11px;font-weight:800;color:#2A4A7F;background:#E5EDF7;padding:3px 9px;border-radius:20px}
  .mi-mon{font-size:11px;font-weight:700;color:#0B8A5E;display:flex;align-items:center;gap:4px}
  .mi-mon i{width:13px;height:13px}
  .mi-sw{margin-top:11px;display:flex;flex-direction:column;gap:6px}
  .mi-sw-f,.mi-sw-w{display:flex;align-items:center;gap:7px;font-size:12.5px}
  .mi-sw-f{color:#0B8A5E}.mi-sw-w{color:#b3261e}
  .mi-sw-f i,.mi-sw-w i{width:14px;height:14px;flex:0 0 auto}
  .mi-trend{width:30px;height:30px;border-radius:9px;display:grid;place-items:center}
  .mi-trend i{width:16px;height:16px}
  .mi-trend.alta{background:#E4F5EC;color:#0B8A5E}.mi-trend.baixa{background:#FDE8E6;color:#b3261e}.mi-trend.estavel{background:#EEF1F0;color:#69756f}
  .mi-part{margin-top:12px}
  .mi-part-l{font-size:11px;color:var(--muted);font-weight:700;margin-bottom:4px}
  .mi-part-bar{height:8px;background:#EEF1F0;border-radius:5px;overflow:hidden}
  .mi-part-bar span{display:block;height:100%;background:#0B6B61;border-radius:5px}
  .mi-part-v{font-size:13px;font-weight:800;color:#0B6B61;margin-top:4px}
  .mi-obs{font-size:12px;color:var(--ink-2);margin-top:10px;line-height:1.45;border-top:1px solid var(--line);padding-top:9px}
  .mi-td{cursor:pointer}.mi-td:hover{border-color:#9fc4ba}
  .mi-td-h{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:8px}
  .mi-td-cat{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;color:#0B6B61;background:#E9F3EF;padding:3px 9px;border-radius:20px}
  .mi-td-hz{font-size:11.5px;color:var(--muted);font-weight:700}
  .mi-td-date{font-size:11px;color:var(--muted);margin-left:auto}
  .mi-td-t{font-size:15.5px;font-weight:800;color:var(--ink);margin-bottom:5px}
  .mi-td-x{font-size:13px;color:var(--ink-2);line-height:1.5}
  .mi-check{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-2);cursor:pointer;margin-top:4px}
  .mi-check input{width:16px;height:16px;accent-color:#0B6B61}

  /* calendário agrícola */
  .cal-grid{min-width:760px;display:flex;flex-direction:column;gap:7px}
  .cal-row{display:grid;grid-template-columns:200px 1fr;align-items:center;gap:12px}
  .cal-cult{display:flex;align-items:center;gap:9px;font-size:13.5px;font-weight:700;color:var(--ink)}
  .cal-cult i{width:17px;height:17px;color:var(--brand);flex:0 0 auto}
  .cal-cells{display:grid;grid-template-columns:repeat(12,1fr);gap:4px}
  .cal-cell{height:24px;border-radius:6px;background:var(--bg);}
  .cal-cell.on{box-shadow:inset 0 0 0 1px rgba(0,0,0,.04)}
  .cal-cell.cal-now{outline:2px solid #2A4A7F;outline-offset:1px}
  .cal-head .cal-mh{font-size:11px;font-weight:800;color:var(--muted);text-align:center;padding:2px 0}
  .cal-head .cal-mh.cal-now{color:#2A4A7F}
  .cal-legend{display:flex;flex-wrap:wrap;gap:16px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
  .cal-leg{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--ink-2)}
  .cal-sw{width:16px;height:16px;border-radius:5px;display:inline-block}
  .cal-now-sw{background:var(--bg);outline:2px solid #2A4A7F;outline-offset:-1px}
  .cal-foco{background:#F4FAF8;border:1px solid #d6e9e3;border-radius:14px;padding:14px 16px;margin-bottom:16px}
  .cal-foco-h{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:800;color:var(--brand);margin-bottom:8px}
  .cal-foco-h i{width:17px;height:17px}
  .cal-foco-row{font-size:13px;color:var(--ink-2);line-height:1.6;display:flex;align-items:center;gap:8px}
  .cal-foco-row b{color:var(--ink)}

  /* insights de vendas */
  .in-seg{display:inline-flex;background:#eef1f0;border-radius:11px;padding:4px;gap:3px;flex-wrap:wrap}
  .in-seg button{border:0;background:none;font:700 13px/1 inherit;color:var(--muted,#69756f);padding:9px 14px;border-radius:8px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:7px}
  .in-seg button i{width:15px;height:15px}
  .in-seg button.on{background:#fff;color:var(--ink,#16201a);box-shadow:0 1px 3px rgba(0,0,0,.1)}
  .in-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
  .in-card{background:var(--card,#fff);border:1px solid var(--line,#e6ebe9);border-radius:14px;padding:16px}
  .in-card-h{display:flex;align-items:center;gap:11px;margin-bottom:10px}
  .in-ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex:0 0 auto}
  .in-ic i{width:19px;height:19px}
  .in-card-tt{font-size:14.5px;font-weight:800;color:var(--ink,#16201a);flex:1;min-width:0}
  .in-sev{font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .in-card-x{font-size:13px;color:var(--ink-2,#3a4a44);line-height:1.5}
  .in-card-a{display:flex;align-items:flex-start;gap:7px;font-size:12.5px;font-weight:700;color:#0B6B61;margin-top:11px;padding-top:11px;border-top:1px solid var(--line,#f0f3f1)}
  .in-card-a i{width:15px;height:15px;flex:0 0 auto;margin-top:1px}

  /* movimentos do concorrente */
  .cc-mov{margin-top:12px;padding-top:11px;border-top:1px solid var(--line,#f0f3f1)}
  .cc-mov-last{font-size:12px;line-height:1.5}
  .cc-mov-tag{font-weight:800;display:inline-flex;align-items:center;gap:4px}.cc-mov-tag i{width:13px;height:13px}
  .cc-mov-x{color:var(--ink-2,#3a4a44)}
  .cc-mov-dt{color:var(--muted,#8b968f);margin-left:6px;font-size:11px}
  .cc-mov-empty{font-size:12px;color:var(--muted,#8b968f)}
  .cc-mov-acts{display:flex;gap:14px;margin-top:9px;flex-wrap:wrap}
  .cc-tl{display:flex;flex-direction:column;gap:14px}
  .cc-tl-row{display:flex;gap:11px;align-items:flex-start}
  .cc-tl-ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex:0 0 auto}.cc-tl-ic i{width:17px;height:17px}
  .cc-tl-t{font-size:13px;font-weight:800;color:var(--ink,#16201a)}
  .cc-tl-x{font-size:13px;color:var(--ink-2,#3a4a44);line-height:1.5;margin-top:2px}
  .cc-tl-dt{font-size:11px;color:var(--muted,#8b968f);margin-top:3px}
  /* fontes de monitoramento */
  .ft-row{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line,#eef1f0)}
  .ft-row:last-child{border-bottom:0}
  .ft-row.off{opacity:.55}
  .ft-ic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex:0 0 auto}.ft-ic i{width:17px;height:17px}
  .ft-main{flex:1;min-width:0}
  .ft-t{font-size:13.5px;font-weight:700;color:var(--ink,#16201a)}
  .ft-url{color:#2A6FDB;text-decoration:none}
  .ft-s{font-size:11.5px;color:var(--muted,#8b968f);margin-top:2px}
  .cl-ul{margin:10px 0 0 18px;font-size:13px;line-height:1.7;color:var(--ink-2,#3a4a44)}
  .cl-ul li{margin-bottom:4px}
  .cl-ul b{color:var(--ink,#16201a)}
  code{background:#eef1f0;border-radius:5px;padding:1px 6px;font-size:12px}
  .cal-dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto}
  .mc-select{font-family:var(--font);font-size:13px;font-weight:700;color:var(--ink);background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:9px 12px;cursor:pointer}

  /* Panorama setorial */
  .pn-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .pn-tab{display:inline-flex;align-items:center;gap:7px;border:1.5px solid var(--line);background:#fff;color:var(--ink);border-radius:11px;padding:9px 14px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
  .pn-tab i{width:16px;height:16px}
  .pn-tab.on{background:#0B6B61;border-color:#0B6B61;color:#fff}
  .pn-inds{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
  .pn-ind{background:var(--bg,#f3f6f4);border-radius:12px;padding:11px 13px}
  .pn-ind-v{font-size:17px;font-weight:800;color:#0B6B61}
  .pn-ind-k{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:2px}
  .pn-res{margin-top:14px;background:#f3faf6;border:1px solid #cfe9dd;border-radius:12px;padding:13px 15px;font-size:13.5px;line-height:1.55;color:var(--ink)}
  .pn-cv{padding:10px 0;border-bottom:1px solid var(--line)}
  .pn-cv:last-child{border-bottom:0}
  .pn-cv-top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:6px}
  .pn-cv-cult{font-size:11px;font-weight:700;color:var(--muted);background:var(--bg,#eef3f1);padding:2px 8px;border-radius:999px;margin-left:4px}
